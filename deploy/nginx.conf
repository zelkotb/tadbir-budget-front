# Tadbir Budget — frontend (Angular SPA) served by nginx, with the backend API
# reverse-proxied on the same origin so there is no CORS and the HttpOnly refresh
# cookie works over plain HTTP. Single machine: run the container with host
# networking (HOST_NET=1 in deploy.sh) so nginx reaches the backend on 127.0.0.1:8080.
server {
    listen 80;
    server_name _;

    # Multipart uploads up to 100 MB (matches the backend limit).
    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    # ── API reverse proxy (same origin → no CORS, cookie flows) ───────────────
    # Requires host networking so 127.0.0.1 is the host's loopback (where the
    # backend listens), not the container's. See deploy.sh HOST_NET=1.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # long requests / SSE notifications
        proxy_buffering    off;    # stream responses (SSE-friendly)
    }

    # Backend health check (used by deploy.sh smoke test).
    location = /actuator/health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # ── GeoServer reverse proxy (same origin → map layers without CORS) ───────
    # GeoServer listens on the host's loopback (127.0.0.1:8081); host networking
    # makes it reachable here. The Angular map must use the RELATIVE WMS/WFS URL
    # (e.g. /geoserver/tadbir/wms), never http://192.168.1.203:8081/... — relative
    # keeps it same-origin and correct once HTTPS fronts this server. After this is
    # live, set GeoServer → Global → Proxy Base URL to http://192.168.1.203/geoserver
    # (switch to the https:// host with TLS) so GetCapabilities returns proxied URLs.
    location /geoserver/ {
        proxy_pass http://127.0.0.1:8081/geoserver/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;            # WMS GetMap can be slow on first render
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    # Hashed JS/CSS/fonts → safe to cache forever.
    location ~* \.(?:js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # i18n + images can change without a content hash → short cache, revalidate.
    location ~* ^/(i18n|assets)/ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # index.html must never be cached, so clients pick up new chunk hashes right
    # after a redeploy (avoids "Failed to fetch dynamically imported module").
    # NOTE: an add_header inside a location overrides (does not inherit) the
    # server-level headers below, so the document's security headers + CSP are
    # repeated here — this block serves the SPA document, where the CSP takes effect.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options        DENY      always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.cdnfonts.com; font-src 'self' data: https://fonts.cdnfonts.com; img-src 'self' data: https://primefaces.org https://server.arcgisonline.com https://api.dicebear.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }

    # ── SPA fallback: every unknown path serves index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Baseline security headers (repeated in `location = /index.html`, which
    #    otherwise overrides them) ──────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        DENY      always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.cdnfonts.com; font-src 'self' data: https://fonts.cdnfonts.com; img-src 'self' data: https://primefaces.org https://server.arcgisonline.com https://api.dicebear.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
}
