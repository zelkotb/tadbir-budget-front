<div class="layout-topbar" [class.topbar-hidden]="scrolledHidden()">
    <!-- Left: sidebar toggle only (logo now lives in the sidebar header) -->
    <div class="layout-topbar-logo-container">
        <button class="layout-menu-button layout-topbar-action menu-toggle"
                [class.is-open]="menuOpen()"
                (click)="isLoggedIn() && layoutService.onMenuToggle()"
                [style.opacity]="isLoggedIn() ? '1' : '0.3'"
                [style.cursor]="isLoggedIn() ? 'pointer' : 'not-allowed'"
                [attr.aria-expanded]="menuOpen()"
                [attr.aria-label]="'topbar.toggle_menu' | translate">
            <span class="burger" aria-hidden="true"><span></span><span></span><span></span></span>
        </button>
    </div>

    <div class="layout-topbar-actions">

        <!-- Mobile overflow toggle -->
        <button
            class="layout-topbar-menu-button layout-topbar-action"
            pStyleClass="@next"
            enterFromClass="hidden"
            enterActiveClass="animate-scalein"
            leaveToClass="hidden"
            leaveActiveClass="animate-fadeout"
            [hideOnOutsideClick]="true"
        >
            <i class="pi pi-ellipsis-v"></i>
        </button>

        <div class="layout-topbar-menu hidden lg:block">
            <div class="layout-topbar-menu-content">

                @if (isLoggedIn()) {
                    <!-- Search -->
                    <button type="button" class="layout-topbar-action"
                            [attr.aria-label]="'topbar.search' | translate">
                        <i class="pi pi-search"></i>
                    </button>

                    <!-- Settings (animated ring) — admin only -->
                    @if (isAdmin()) {
                        <button type="button" class="layout-topbar-action settings-toggle"
                                [attr.aria-label]="'topbar.settings' | translate">
                            <span class="settings-ring" aria-hidden="true">
                                <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
                                    <rect class="snake-ring" x="4" y="4" width="34" height="34" rx="10"
                                          stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                                </svg>
                            </span>
                            <i class="pi pi-cog"></i>
                        </button>
                    }
                }

                <!-- Language switcher -->
                <div class="relative">
                    <button
                        type="button"
                        class="layout-topbar-action topbar-icon-bordered"
                        pStyleClass="@next"
                        enterFromClass="hidden"
                        enterActiveClass="animate-scalein"
                        leaveToClass="hidden"
                        leaveActiveClass="animate-fadeout"
                        [hideOnOutsideClick]="true"
                        [attr.aria-label]="'topbar.language' | translate"
                    >
                        <i class="pi pi-globe" style="font-size: 1.2rem"></i>
                    </button>
                    <div class="tb-menu hidden absolute top-12 end-0 z-50">
                        @for (lang of languages; track lang.code) {
                            <button
                                type="button"
                                class="tb-menu-item"
                                [class.selected]="lang.code === languageService.currentLang().code"
                                (click)="languageService.setLanguage(lang.code)"
                            >
                                <span class="tb-flag">{{ lang.flag }}</span>
                                <span class="tb-label">{{ lang.label }}</span>
                                @if (lang.code === languageService.currentLang().code) {
                                    <i class="pi pi-check tb-check"></i>
                                }
                            </button>
                        }
                    </div>
                </div>

                <!-- ── Notifications & user menu (shown only when authenticated) ── -->
                @if (isLoggedIn()) {

                    <!-- Notification bell + panel -->
                    <app-notifications />

                    <div class="relative">

                        <!-- Avatar trigger -->
                        <button
                            type="button"
                            class="layout-topbar-action user-avatar-btn"
                            pStyleClass="@next"
                            enterFromClass="hidden"
                            enterActiveClass="animate-scalein"
                            leaveToClass="hidden"
                            leaveActiveClass="animate-fadeout"
                            [hideOnOutsideClick]="true"
                            [attr.aria-label]="'topbar.user_menu' | translate"
                        >
                            <p-avatar
                                [image]="avatarUrl() ?? undefined"
                                [label]="avatarUrl() ? undefined : userInitials()"
                                shape="circle"
                                class="user-avatar"
                            />
                        </button>

                        <!-- Dropdown panel — two rows, no header/divider -->
                        <div class="tb-menu hidden absolute end-0 z-50" style="top: 3.25rem; min-width: 13rem">
                            <a routerLink="/account" class="tb-menu-item">
                                <i class="pi pi-user"></i>
                                <span class="tb-label">{{ 'topbar.profile' | translate }}</span>
                            </a>
                            <button type="button" class="tb-menu-item" (click)="logout()">
                                <i class="pi pi-power-off"></i>
                                <span class="tb-label">{{ 'topbar.logout' | translate }}</span>
                            </button>
                        </div>
                    </div>
                }

            </div>
        </div>
    </div>
</div>
