<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">

        <div style="border-radius: 56px; padding: 0.3rem;
                    background: linear-gradient(180deg, rgba(239, 68, 68, 0.4) 10%, rgba(239, 68, 68, 0) 30%)">

            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20
                        flex flex-col items-center text-center"
                 style="border-radius: 53px; max-width: 520px">

                <!-- 403 badge -->
                <div class="flex justify-center items-center border-2 border-red-500 rounded-full mb-6"
                     style="height: 3.2rem; width: 3.2rem">
                    <i class="pi pi-lock text-2xl! text-red-500"></i>
                </div>

                <span class="text-red-500 font-bold text-6xl mb-4">403</span>

                <!-- Title -->
                <h1 class="text-surface-900 dark:text-surface-0 font-bold text-3xl mb-4">
                    {{ 'error.forbidden.title' | translate }}
                </h1>

                <!-- Message -->
                <p class="text-muted-color text-lg mb-8">
                    {{ 'error.forbidden.message' | translate }}
                </p>

                <!-- Actions -->
                <div class="flex gap-3 flex-wrap justify-center">
                    <p-button
                        [label]="'error.forbidden.go_back' | translate"
                        severity="secondary"
                        (onClick)="goBack()"
                    />
                    <p-button
                        [label]="'error.forbidden.home' | translate"
                        routerLink="/"
                        severity="contrast"
                    />
                </div>

            </div>
        </div>

    </div>
</div>
