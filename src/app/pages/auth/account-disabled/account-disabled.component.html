<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">

        <div style="border-radius: 56px; padding: 0.3rem;
                    background: linear-gradient(180deg, rgba(234, 88, 12, 0.4) 10%, rgba(234, 88, 12, 0) 30%)">

            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20
                        flex flex-col items-center text-center"
                 style="border-radius: 53px; max-width: 520px">

                <!-- Icon -->
                <div class="flex justify-center items-center border-2 border-orange-500 rounded-full mb-6"
                     style="height: 3.2rem; width: 3.2rem">
                    <i class="pi pi-ban text-2xl! text-orange-500"></i>
                </div>

                <!-- Title -->
                <h1 class="text-surface-900 dark:text-surface-0 font-bold text-4xl mb-4">
                    {{ 'auth.account_disabled.title' | translate }}
                </h1>

                <!-- Message -->
                <p class="text-muted-color text-lg mb-8">
                    {{ 'auth.account_disabled.message' | translate }}
                </p>

                <!-- CTA -->
                <p-button
                    [label]="'auth.account_disabled.back' | translate"
                    routerLink="/auth/login"
                    severity="contrast"
                />

            </div>
        </div>

    </div>
</div>
